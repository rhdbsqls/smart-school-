    <script>
        let myTeacherId = null;
        let myOffice = null;
        let mySubject = null;

        let callListUnsubscribe = null;
        let appointmentListUnsubscribe = null;
        let prevWaitingCount = 0;

        // Firebase Timestamp를 보기 편한 문자열(YYYY. MM. DD. HH:MM)로 포맷팅하는 함수 추가
        function formatFirebaseTimestamp(timestamp) {
            if (!timestamp) return "-";
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}. ${month}. ${day} ${hours}:${minutes}`;
        }

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {
                console.log("알림음 재생 제한 우회", e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.Notification && Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            const savedTeacherId = sessionStorage.getItem('teacherId');
            if (savedTeacherId) {
                myTeacherId = savedTeacherId;
                myOffice = sessionStorage.getItem('teacherOffice');
                mySubject = sessionStorage.getItem('teacherSubject');

                document.getElementById('teacher-login-overlay').classList.add('hidden');
                setupTeacherProfile();
                startRealtimeListeners();

                // 3. [추가] 자동 로그인 시 교사 푸시 권한 확인 및 토큰 저장 호출
                requestTeacherPushPermission(myTeacherId);
            }
        });

        // 4. [추가] 교사 브라우저 알림 권한 및 FCM 기기 토큰 획득 요청 함수
        function requestTeacherPushPermission(teacherId) {
            if (!window.Notification) return;

            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    console.log('교사 푸시 알림 권한 허가!');
                    // 기기 고유 토큰 요청 (웹 푸시 인증서 발급받은 실제 VAPID 키 문자열로 아래 필드를 대체하세요)
                    messaging.getToken({ vapidKey: 'YOUR_PUBLIC_VAPID_KEY_HERE' })
                    .then((currentToken) => {
                        if (currentToken) {
                            console.log('교사 FCM 기기 토큰 발급 완료:', currentToken);
                            // 수신한 고유 토큰값을 교사 Firestore 문서에 업데이트하여 학생 예약 시 백그라운드 알림을 받을 수 있게 저장합니다.
                            db.collection('teachers').doc(teacherId).update({
                                fcmToken: currentToken
                            }).catch(err => console.log('토큰 저장 에러:', err));
                        }
                    }).catch((err) => {
                        console.log('교사 토큰 획득 실패:', err);
                    });
                }
            });
        }

        function setupTeacherProfile() {
            document.getElementById('teacher-name').innerText = `${myTeacherId} 선생님`;
            document.getElementById('teacher-info-text').innerText = `${myOffice || '교무실'} [${mySubject || '과목'}]`;
            document.getElementById('teacher-pw-btn').classList.remove('hidden');
        }

        function startRealtimeListeners() {
            if (callListUnsubscribe) callListUnsubscribe();
            if (appointmentListUnsubscribe) appointmentListUnsubscribe();

            listenToCalls();
            listenToAppointments();
        }

        async function teacherSimpleLogin() {
            const tId = document.getElementById('login-teacher-id').value.trim();
            const tPw = document.getElementById('login-teacher-pw').value.trim();

            if (!tId || !tPw) {
                alert("아이디와 비밀번호를 입력해 주세요.");
                return;
            }

            try {
                const docRef = db.collection('teachers').doc(tId);
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();
                    if (String(data.password).trim() === String(tPw).trim()) {
                        myTeacherId = tId;
                        myOffice = data.office || '본교무실';
                        mySubject = data.subject || '담당과목';

                        sessionStorage.setItem('teacherId', myTeacherId);
                        sessionStorage.setItem('teacherOffice', myOffice);
                        sessionStorage.setItem('teacherSubject', mySubject);

                        document.getElementById('login-teacher-id').value = "";
                        document.getElementById('login-teacher-pw').value = "";
                        document.getElementById('teacher-login-overlay').classList.add('hidden');

                        setupTeacherProfile();
                        startRealtimeListeners();

                        // 5. [추가] 로그인 성공 시 교사 푸시 권한 및 토큰 저장 호출
                        requestTeacherPushPermission(myTeacherId);

                        alert(`${myTeacherId} 선생님, 환영합니다!`);
                    } else {
                        alert("비밀번호가 일치하지 않습니다.");
                    }
                } else {
                    const nameQuery = await db.collection('teachers').where('name', '==', tId).get();
                    if(!nameQuery.empty) {
                        const targetDoc = nameQuery.docs[0];
                        const data = targetDoc.data();
                        if(String(data.password).trim() === String(tPw).trim()) {
                            myTeacherId = targetDoc.id;
                            myOffice = data.office || '본교무실';
                            mySubject = data.subject || '담당과목';

                            sessionStorage.setItem('teacherId', myTeacherId);
                            sessionStorage.setItem('teacherOffice', myOffice);
                            sessionStorage.setItem('teacherSubject', mySubject);

                            document.getElementById('login-teacher-id').value = "";
                            document.getElementById('login-teacher-pw').value = "";
                            document.getElementById('teacher-login-overlay').classList.add('hidden');

                            setupTeacherProfile();
                            startRealtimeListeners();

                            // 6. [추가] 대체 이름 찾기 로그인 시에도 권한 허가 및 토큰 저장 호출
                            requestTeacherPushPermission(myTeacherId);

                            alert(`${myTeacherId} 선생님, 환영합니다!`);
                            return;
                        }
                    }
                    alert("등록되지 않은 선생님 정보이거나 입력값이 올바르지 않습니다.");
                }
            } catch (err) {
                console.error("로그인 중 서버에러 발생: ", err);
                alert("네트워크 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            }
        }

        async function logout() {
            if (callListUnsubscribe) callListUnsubscribe();
            if (appointmentListUnsubscribe) appointmentListUnsubscribe();

            myTeacherId = null;
            sessionStorage.clear();
            localStorage.clear();

            window.location.replace(window.location.origin + window.location.pathname);
        }

        function openTeacherPwModal() {
            document.getElementById('t-current-pw').value = "";
            document.getElementById('t-new-pw').value = "";
            document.getElementById('t-new-pw-confirm').value = "";
            document.getElementById('teacher-pw-modal').classList.remove('hidden');
        }

        function closeTeacherPwModal() {
            document.getElementById('teacher-pw-modal').classList.add('hidden');
        }

        async function submitTeacherNewPassword() {
            const currentPw = document.getElementById('t-current-pw').value.trim();
            const newPw = document.getElementById('t-new-pw').value.trim();
            const newPwConfirm = document.getElementById('t-new-pw-confirm').value.trim();

            if (!currentPw || !newPw || !newPwConfirm) {
                alert("모든 입력란을 작성해 주세요.");
                return;
            }

            if (newPw !== newPwConfirm) {
                alert("새 비밀번호 확인 입력값과 다릅니다.");
                return;
            }

            try {
                const docRef = db.collection('teachers').doc(myTeacherId);
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();

                    if (data.password !== currentPw) {
                        alert("현재 비밀번호가 틀렸습니다.");
                        return;
                    }

                    await docRef.update({
                        password: newPw
                    });

                    alert("비밀번호가 변경되었습니다. 다시 로그인해 주세요.");
                    closeTeacherPwModal();
                    logout();
                }
            } catch (err) {
                alert("수정 중 오류 발생!");
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');

            const titles = {
                'call-tab': '실시간 학생 호출',
                'appointment-tab': '학생 예약 신청 목록'
            };
            document.getElementById('tab-title').innerText = titles[tabId];
        }

        async function searchStudent() {
            const q = document.getElementById('call-student-query').value.trim();
            if (!q) {
                alert("검색할 학생의 이름이나 학번을 적어주세요!");
                return;
            }

            try {
                let snap = await db.collection('students').where('studentNum', '==', q).get();
                if (snap.empty) {
                    snap = await db.collection('students').where('name', '==', q).get();
                }

                if (snap.empty) {
                    alert("일치하는 학생 데이터가 존재하지 않습니다.");
                    document.getElementById('selected-student-box').classList.add('hidden');
                    return;
                }

                const doc = snap.docs[0];
                const s = doc.data();

                document.getElementById('sel-student-info').innerText = `${s.studentNum} 학번 - ${s.name} 학생`;
                document.getElementById('sel-student-name').value = s.name;
                document.getElementById('sel-student-email').value = s.email || "";
                document.getElementById('sel-student-num').value = s.studentNum;
                document.getElementById('selected-student-box').classList.remove('hidden');

            } catch (e) {
                console.error(e);
            }
        }

        async function submitCall() {
            const sName = document.getElementById('sel-student-name').value;
            const sEmail = document.getElementById('sel-student-email').value;
            const sNum = document.getElementById('sel-student-num').value;
            const period = document.getElementById('call-period').value;
            const memo = document.getElementById('call-memo').value.trim();

            if (!sName) {
                alert("호출할 대상을 먼저 검색 및 지정해 주세요.");
                return;
            }

            try {
                await db.collection('calls').add({
                    studentName: sName,
                    studentEmail: sEmail,
                    studentNum: sNum,
                    teacherName: myTeacherId,
                    period: period,
                    memo: memo,
                    status: '대기 중',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert(`${sName} 학생을 성공적으로 호출했습니다!`);
                document.getElementById('call-student-query').value = "";
                document.getElementById('call-memo').value = "";
                document.getElementById('selected-student-box').classList.add('hidden');
            } catch (e) {
                alert("호출 전송 오류가 발생했습니다.");
            }
        }

        function listenToCalls() {
            callListUnsubscribe = db.collection('calls')
                .where('teacherName', '==', myTeacherId)
                .onSnapshot(snap => {
                    const tbody = document.getElementById('teacher-call-list');
                    tbody.innerHTML = '';

                    if (snap.empty) {
                        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">등록한 호출 건이 존재하지 않습니다.</td></tr>';
                        return;
                    }

                    snap.forEach(doc => {
                        const d = doc.data();
                        const isConfirmed = d.status === '확인 완료';
                        const badgeColor = isConfirmed ? 'bg-emerald-100 text-emerald-800' : 'bg-orange-100 text-orange-800 animate-pulse';

                        const timeAndMemo = d.memo ? `${d.period} <br><span class="text-xs text-gray-400">메모: ${d.memo}</span>` : d.period;

                        // 호출 보낸 일시 표시
                        const callDateTime = formatFirebaseTimestamp(d.timestamp);

                        tbody.innerHTML += `
                            <tr class="text-sm border-b hover:bg-gray-50">
                                <td class="p-3 font-semibold text-slate-800">${d.studentNum || ''} ${d.studentName}</td>
                                <td class="p-3 font-semibold text-slate-600">${timeAndMemo}</td>
                                <td class="p-3 text-xs text-slate-500 font-medium">${callDateTime}</td>
                                <td class="p-3">
                                    <span class="${badgeColor} px-2 py-1 rounded text-xs font-bold">${d.status}</span>
                                </td>
                                <td class="p-3 text-center">
                                    <button onclick="deleteCall('${doc.id}')" class="text-xs text-rose-500 hover:text-rose-700 font-bold px-2 py-1 border rounded hover:bg-rose-50 transition">삭제</button>
                                </td>
                            </tr>
                        `;
                    });
                });
        }

        async function deleteCall(callId) {
            if (!confirm("해당 호출 건을 목록에서 삭제하시겠습니까?")) return;
            await db.collection('calls').doc(callId).delete();
        }

        function listenToAppointments() {
            appointmentListUnsubscribe = db.collection('appointments')
                .where('teacherId', '==', myTeacherId)
                .onSnapshot(snap => {
                    const tbody = document.getElementById('teacher-appointment-list');
                    tbody.innerHTML = '';

                    let waitingCount = 0;

                    if (snap.empty) {
                        tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-400">신청된 예약 건이 없습니다.</td></tr>';
                        updateTeacherBadge(0);
                        prevWaitingCount = 0;
                        return;
                    }

                    snap.forEach(doc => {
                        const d = doc.data();
                        const currentStatus = d.status;

                        if (currentStatus === '대기') {
                            waitingCount++;
                        }

                        let badgeColor = 'bg-gray-100';
                        if (currentStatus === '수락') badgeColor = 'bg-emerald-100 text-emerald-800 font-bold';
                        else if (currentStatus === '반려') badgeColor = 'bg-rose-100 text-rose-800 font-bold';

                        // 방문 신청 날짜 일시 표시
                        const appDateTime = formatFirebaseTimestamp(d.timestamp);

                        tbody.innerHTML += `
                            <tr class="text-sm border-b">
                                <td class="p-3 font-semibold text-slate-800">${d.studentNum} ${d.studentName}</td>
                                <td class="p-3 text-slate-600 font-semibold">${d.time}</td>
                                <td class="p-3 text-xs text-slate-500">${d.category}</td>
                                <td class="p-3 text-xs max-w-xs whitespace-pre-wrap text-slate-600">${d.detail}</td>
                                <td class="p-3 text-xs text-slate-500 font-medium">${appDateTime}</td>
                                <td class="p-3">
                                    <span class="${badgeColor} px-2.5 py-1 rounded-full text-xs">${currentStatus}</span>
                                </td>
                                <td class="p-3 flex flex-col gap-1.5">
                                    <input id="feedback-${doc.id}" type="text" placeholder="예: 5층 음악실로 오렴" value="${d.feedback || ''}" class="p-1.5 border rounded text-xs text-slate-800 font-medium">
                                    <div class="flex gap-1 justify-end">
                                        <button onclick="updateStatus('${doc.id}', '수락')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-[10px] px-2 py-1 rounded transition">수락</button>
                                        <button onclick="updateStatus('${doc.id}', '반려')" class="bg-rose-600 hover:bg-rose-700 text-white font-bold text-[10px] px-2 py-1 rounded transition">반려</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });

                    updateTeacherBadge(waitingCount);

                    if (waitingCount > prevWaitingCount) {
                        playNotificationSound();
                        if (window.Notification && Notification.permission === "granted") {
                            new Notification("📅 방문 신청 도착", {
                                body: `방문 신청 도착.`
                            });
                        }
                    }
                    prevWaitingCount = waitingCount;
                });
        }

        function updateTeacherBadge(count) {
            const badgeEl = document.getElementById('teacher-noti-badge');
            if (count > 0) {
                badgeEl.innerText = count;
                badgeEl.classList.remove('hidden');
            } else {
                badgeEl.classList.add('hidden');
            }
        }

        async function updateStatus(appId, newStatus) {
            const fd = document.getElementById(`feedback-${appId}`).value.trim();
            try {
                await db.collection('appointments').doc(appId).update({
                    status: newStatus,
                    feedback: fd
                });
                alert(`성공적으로 [${newStatus}] 처리 및 피드백을 전달하였습니다.`);
            } catch (err) {
                alert("상태 업데이트 실패!");
            }
        }
    </script>
</body>
</html>
