    <script>
        let myStudentNum = null;
        let myStudentName = null;
        let myStudentEmail = null;

        let myCallUnsubscribe = null;
        let myAppointmentUnsubscribe = null;

        let prevUnconfirmedCount = 0;
        let lastKnownStatusMap = {}; // 이전 승인 상태 저장용 딕셔너리

        // 중복 제출 방지용 플래그 변수 추가
        let isSubmittingAppointment = false;

        // Firebase Timestamp를 보기 편한 문자열(YYYY. MM. DD. HH:MM)로 포맷팅하는 함수 추가
        function formatFirebaseTimestamp(timestamp) {
            if (!timestamp) return "-";
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}. ${month}. ${day} ${hours}:${minutes}`;
        }

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {
                console.log("알림 오작동 방지", e);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (window.Notification && Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            await loadTeachersFromFirebase();

            const savedStudentNum = sessionStorage.getItem('studentNum');
            if (savedStudentNum) {
                myStudentNum = savedStudentNum;
                myStudentName = sessionStorage.getItem('studentName');
                myStudentEmail = sessionStorage.getItem('studentEmail');

                document.getElementById('student-login-overlay').classList.add('hidden');
                setupStudentProfile();
                startRealtimeListeners();

                // 3. [추가] 자동 로그인 사용자 푸시 권한 연동
                requestPushPermission(myStudentNum);
            }
        });

        // 4. [추가] 브라우저 알림 권한 및 FCM 기기 토큰 획득 요청 함수
        function requestPushPermission(studentNum) {
            if (!window.Notification) return;

            Notification.requestPermission().then((permission) => {
                if (permission === 'granted') {
                    console.log('푸시 알림 권한 획득 성공!');

                    // 기기 고유 토큰 요청 (VAPID 키는 Firebase 메시징 설정 시 발급받아 대체해 사용하세요)
                    messaging.getToken({ vapidKey: 'YOUR_PUBLIC_VAPID_KEY_HERE' })
                    .then((currentToken) => {
                        if (currentToken) {
                            console.log('FCM 기기 토큰 발급 완료:', currentToken);
                            // 수신한 고유 토큰값을 학생 Firestore 문서에 업데이트하여 백그라운드 푸시 준비를 마칩니다.
                            db.collection('students').doc(studentNum).update({
                                fcmToken: currentToken
                            }).catch(err => console.log('토큰 저장 에러:', err));
                        }
                    }).catch((err) => {
                        console.log('토큰 획득 과정 오류:', err);
                    });
                }
            });
        }

        async function loadTeachersFromFirebase() {
            const selectEl = document.getElementById('booking-teacher');
            try {
                const snapshot = await db.collection('teachers').get();
                if (snapshot.empty) {
                    selectEl.innerHTML = '<option value="">등록된 선생님이 없습니다.</option>';
                    return;
                }

                let html = '<option value="">-- 방문할 선생님을 선택하세요 --</option>';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const tName = data.name || doc.id;
                    const subject = data.subject ? ` (${data.subject})` : '';
                    const office = data.office ? ` - ${data.office}` : '';

                    html += `<option value="${tName}">${tName} 선생님${subject}${office}</option>`;
                });
                selectEl.innerHTML = html;
            } catch (error) {
                selectEl.innerHTML = '<option value="">선생님 목록 로드 실패</option>';
            }
        }

        function startRealtimeListeners() {
            if (myCallUnsubscribe) myCallUnsubscribe();
            if (myAppointmentUnsubscribe) myAppointmentUnsubscribe();

            listenToMyCalls();
            listenToMyAppointments();
        }

        async function studentSimpleLogin() {
            const sNum = document.getElementById('login-student-num').value.trim();
            const sPw = document.getElementById('login-student-pw').value.trim();

            if (!sNum || !sPw) {
                alert("학번과 비밀번호를 모두 입력해 주세요!");
                return;
            }

            try {
                const docRef = db.collection('students').doc(sNum);
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();
                    if (data.password === sPw) {
                        myStudentNum = data.studentNum;
                        myStudentName = data.name;
                        myStudentEmail = data.email;

                        sessionStorage.setItem('studentNum', myStudentNum);
                        sessionStorage.setItem('studentName', myStudentName);
                        sessionStorage.setItem('studentEmail', myStudentEmail);

                        document.getElementById('login-student-num').value = "";
                        document.getElementById('login-student-pw').value = "";
                        document.getElementById('student-login-overlay').classList.add('hidden');

                        setupStudentProfile();
                        startRealtimeListeners();

                        // 5. [추가] 로그인 완료 시 푸시 알림 권한 및 토큰 업데이트 요청
                        requestPushPermission(myStudentNum);

                        alert(`${myStudentName} 학생, 로그인되었습니다.`);
                    } else {
                        alert('비밀번호가 일치하지 않습니다.');
                    }
                } else {
                    alert('등록되지 않은 학번입니다.');
                }
            } catch (error) {
                alert("서버 연결에 실패했습니다.");
            }
        }

        function setupStudentProfile() {
            document.getElementById('student-name').innerText = `${myStudentName} 학생`;
            document.getElementById('student-num-info').innerText = `${myStudentNum}`;
            document.getElementById('pw-change-btn').classList.remove('hidden');
        }

        async function logout() {
            if (myCallUnsubscribe) myCallUnsubscribe();
            if (myAppointmentUnsubscribe) myAppointmentUnsubscribe();

            myStudentNum = null;
            myStudentName = null;
            myStudentEmail = null;

            document.getElementById('student-name').innerText = "로그인 필요";
            document.getElementById('student-num-info').innerText = "학번 정보";
            document.getElementById('pw-change-btn').classList.add('hidden');
            document.getElementById('call-badge').classList.add('hidden');

            sessionStorage.clear();
            localStorage.clear();

            window.location.replace(window.location.origin + window.location.pathname);
        }

        function openPwModal() {
            document.getElementById('current-pw').value = "";
            document.getElementById('new-pw').value = "";
            document.getElementById('new-pw-confirm').value = "";
            document.getElementById('pw-change-modal').classList.remove('hidden');
        }

        function closePwModal() {
            document.getElementById('pw-change-modal').classList.add('hidden');
        }

        async function submitNewPassword() {
            const currentPw = document.getElementById('current-pw').value.trim();
            const newPw = document.getElementById('new-pw').value.trim();
            const newPwConfirm = document.getElementById('new-pw-confirm').value.trim();

            if (!currentPw || !newPw || !newPwConfirm) {
                alert("빈칸을 모두 입력해 주세요.");
                return;
            }

            if (newPw !== newPwConfirm) {
                alert("새 비밀번호와 비밀번호 확인 입력값이 일치하지 않습니다.");
                return;
            }

            try {
                const docRef = db.collection('students').doc(myStudentNum);
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();

                    if (data.password !== currentPw) {
                        alert("현재 사용 중인 기존 비밀번호가 올바르지 않습니다.");
                        return;
                    }

                    await docRef.update({
                        password: newPw
                    });

                    alert("비밀번호가 성공적으로 변경되었습니다! 다시 로그인해 주세요.");
                    closePwModal();
                    logout();
                }
            } catch (err) {
                alert("변경 오류: " + err.message);
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');

            const titles = {
                'booking-tab': '방문 예약 신청',
                'my-status-tab': '내 신청/호출 현황'
            };
            document.getElementById('tab-title').innerText = titles[tabId];
        }

        async function submitAppointment() {
            if (!myStudentNum) {
                alert("로그인이 만료되었습니다. 다시 로그인해 주세요.");
                return;
            }

            // 중복 제출 원천 차단
            if (isSubmittingAppointment) {
                return;
            }

            const teacherId = document.getElementById('booking-teacher').value;
            const time = document.getElementById('booking-time').value;
            const category = document.getElementById('booking-category').value;
            const detail = document.getElementById('booking-detail').value.trim();

            if (!teacherId) {
                alert("선생님을 선택해주세요");
                return;
            }

            if (!detail) {
                alert("구체적인 예약 상담 사유를 적어주세요.");
                return;
            }

            try {
                // 전송 시작 시 플래그 락(Lock) 설정 및 버튼 비활성화
                isSubmittingAppointment = true;
                const submitBtn = document.getElementById('btn-submit-appointment');
                if (submitBtn) submitBtn.disabled = true;

                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: detail })
                });

                const predResult = await response.json();

                if (predResult.status === 'success' && predResult.result === 0) {
                    alert("⚠️ 입력하신 상담 내용에 불필요하거나 비속어로 오인될 수 있는 표현이 감지되었습니다. 내용을 수정하여 다시 작성해 주세요.");
                    // 중복 방지 락 해제
                    isSubmittingAppointment = false;
                    if (submitBtn) submitBtn.disabled = false;
                    return;
                }

                const appointmentData = {
                    studentNum: myStudentNum || "",
                    studentName: myStudentName || "이름 없음",
                    studentEmail: myStudentEmail || "이메일 없음",
                    teacherId: teacherId,
                    time: time,
                    category: category,
                    detail: detail,
                    status: '대기',
                    feedback: '',
                    studentChecked: false,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('appointments').add(appointmentData);

                alert(`${teacherId} 선생님께 방문 예약 신청을 완료했습니다.`);
                document.getElementById('booking-detail').value = "";
                switchTab('my-status-tab');
            } catch (err) {
                alert("오류 발생: " + err.message);
            } finally {
                // 성공하든 실패하든 전송 완료 후 최종 락 해제
                isSubmittingAppointment = false;
                const submitBtn = document.getElementById('btn-submit-appointment');
                if (submitBtn) submitBtn.disabled = false;
            }
        }

        function listenToMyCalls() {
            if (!myStudentNum) return;

            myCallUnsubscribe = db.collection('calls')
                .where('studentNum', '==', myStudentNum)
                .onSnapshot(snapshot => {
                    const tbody = document.getElementById('my-call-list');
                    tbody.innerHTML = '';

                    let unconfirmedCount = 0;

                    if (snapshot.empty) {
                        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">나를 호출한 호출 내역이 없습니다.</td></tr>';
                        updateBadge(0);
                        prevUnconfirmedCount = 0;
                        return;
                    }

                    let lastTeacherName = "";
                    let lastPeriod = "";

                    snapshot.forEach(doc => {
                        const d = doc.data();
                        const isConfirmed = d.status === '확인 완료';

                        // '대기 중' 상태인 호출을 정확히 카운트하여 배지에 반영
                        if (!isConfirmed && d.status === '대기 중') {
                            unconfirmedCount++;
                            lastTeacherName = d.teacherName;
                            lastPeriod = d.period;
                        }

                        let actionBtn = "";
                        if (!isConfirmed) {
                            actionBtn = `
                                <button onclick="confirmCall('${doc.id}', '${d.teacherName}')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-1.5 rounded transition shadow-sm font-bold">
                                    확인 서명 ✍️
                                </button>
                            `;
                        } else {
                            actionBtn = `<span class="text-green-600 font-bold text-xs bg-green-50 px-2 py-1 rounded">확인 서명됨 ✅</span>`;
                        }

                        const timeAndMemo = d.memo ? `${d.period} <br><span class="text-xs text-gray-500 font-normal">📝 메모: ${d.memo}</span>` : d.period;

                        // 호출 등록 일시 데이터 추출
                        const regDateTime = formatFirebaseTimestamp(d.timestamp);

                        tbody.innerHTML += `
                            <tr class="text-sm border-b hover:bg-gray-50">
                                <td class="p-3 font-bold text-slate-800">${d.teacherName} 선생님</td>
                                <td class="p-3 font-semibold text-indigo-700">${timeAndMemo}</td>
                                <td class="p-3 text-xs text-slate-500 font-medium">${regDateTime}</td>
                                <td class="p-3 text-xs font-mono">${d.status}</td>
                                <td class="p-3 text-center">${actionBtn}</td>
                            </tr>
                        `;
                    });

                    updateBadge(unconfirmedCount);

                    if (unconfirmedCount > prevUnconfirmedCount) {
                        playNotificationSound();
                        if (window.Notification && Notification.permission === "granted") {
                            new Notification("🔔 스마트 교무실 알림", {
                                body: `${lastTeacherName} 선생님이 부르십니다: "${lastPeriod}"`
                            });
                        }
                    }
                    prevUnconfirmedCount = unconfirmedCount;

                }, error => {
                    console.error("호출 수신 실패:", error);
                });
        }

        function updateBadge(count) {
            const badgeEl = document.getElementById('call-badge');
            if (count > 0) {
                badgeEl.innerText = count;
                badgeEl.classList.remove('hidden');
            } else {
                badgeEl.classList.add('hidden');
            }
        }

        function listenToMyAppointments() {
            if (!myStudentNum) return;

            myAppointmentUnsubscribe = db.collection('appointments')
                .where('studentNum', '==', myStudentNum)
                .onSnapshot(snapshot => {
                    const tbody = document.getElementById('my-appointment-list');
                    tbody.innerHTML = '';

                    if (snapshot.empty) {
                        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">접수된 예약 리스트가 없습니다.</td></tr>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const d = doc.data();
                        const appId = doc.id;
                        const currentStatus = d.status;

                        if (lastKnownStatusMap[appId] !== undefined && lastKnownStatusMap[appId] === '대기' && currentStatus !== '대기') {
                            playNotificationSound();
                            if (window.Notification && Notification.permission === "granted") {
                                new Notification("📅 예약 상태 업데이트", {
                                    body: `${d.teacherId} 선생님이 신청하신 예약을 [${currentStatus}] 처리하셨습니다!`
                                });
                            }
                            alert(`📅 ${d.teacherId} 선생님이 예약을 [${currentStatus}] 처리하셨습니다!\n메모: ${d.feedback || "없음"}`);
                        }

                        lastKnownStatusMap[appId] = currentStatus;

                        let statusBadge = '';
                        if (currentStatus === '대기') {
                            statusBadge = `<span class="bg-gray-100 text-gray-800 px-2.5 py-1 rounded-full text-xs font-semibold animate-pulse">대기 중</span>`;
                        } else if (currentStatus === '수락') {
                            statusBadge = `<span class="bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-full text-xs font-bold">승인 완료 🎉</span>`;
                        } else {
                            statusBadge = `<span class="bg-rose-100 text-rose-800 px-2.5 py-1 rounded-full text-xs font-bold">반려(거절)</span>`;
                        }

                        // 예약 신청 등록 일시 추출
                        const appDateTime = formatFirebaseTimestamp(d.timestamp);

                        tbody.innerHTML += `
                            <tr class="text-sm border-b hover:bg-gray-50">
                                <td class="p-3 font-bold text-slate-800">${d.teacherId} 선생님</td>
                                <td class="p-3 font-semibold text-indigo-700">${d.time}</td>
                                <td class="p-3 text-xs text-slate-500 font-medium">${appDateTime}</td>
                                <td class="p-3">${statusBadge}</td>
                                <td class="p-3 text-gray-600 text-xs whitespace-pre-wrap">${d.feedback || '선생님의 확인 대기 중...'}</td>
                            </tr>
                        `;
                    });
                }, error => {
                    console.error("예약 현황 수신 실패:", error);
                });
        }

        async function confirmCall(callId, teacherName) {
            try {
                await db.collection('calls').doc(callId).update({
                    status: '확인 완료'
                });
                alert(`${teacherName} 선생님의 호출 확인 서명을 완료하였습니다. 안전하게 교무실을 방문해 주세요!`);
            } catch (err) {
                alert("확인 처리 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
